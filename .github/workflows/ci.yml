name: Quality Gate CI

# 什么时候触发这个自动化流程
on:
  push:
    branches: [ main, develop ]      # 当推送到 main 或 develop 分支时
  pull_request:
    branches: [ main ]                # 当创建针对 main 的 PR 时

# 要执行的任务
jobs:
  test-user-service:
    # 在什么环境运行
    runs-on: ubuntu-latest

    # 具体的执行步骤
    steps:
      # 第1步：把代码下载到运行环境
      - name: Checkout code
        uses: actions/checkout@v3

      # 第2步：安装 Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'      # 和你本地保持一致

      # 第3步：安装依赖
      - name: Install dependencies
        run: |
          cd user_service
          pip install -r requirements.txt
          pip install pytest pytest-cov

      # 第4步：运行测试
      - name: Run tests
        run: |
          cd user_service
          pytest tests/ -v --cov=./ --cov-report=xml

      # 第5步：上传测试报告（可选）
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./user_service/coverage.xml